services:
  - type: web
    name: project-tracker-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: starter
    buildCommand: ''
    startCommand: 'uvicorn main:app --host 0.0.0.0 --port 8000'
    envVars:
      - key: SECRET_KEY
        fromService: null
      - key: DATABASE_URL
        fromService: null
